```html
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Forbidden Circle</title>

<style>

body{
margin:0;
background:black;
color:red;
font-family:Courier New, monospace;
text-align:center;
overflow:hidden;
}

/* dark smoke */

body:before{
content:"";
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle,#250000,black);
animation:fog 8s infinite alternate;
z-index:-1;
}

@keyframes fog{
from{opacity:0.6}
to{opacity:1}
}

/* blood title */

.title{
font-size:36px;
text-shadow:0 0 20px red;
animation:glitch 1s infinite;
}

@keyframes glitch{
0%{transform:translate(0)}
20%{transform:translate(-2px,2px)}
40%{transform:translate(2px,-2px)}
60%{transform:translate(-2px,1px)}
80%{transform:translate(2px,1px)}
100%{transform:translate(0)}
}

/* ritual circle */

.circle{
width:280px;
height:280px;
border-radius:50%;
border:2px solid red;
margin:auto;
margin-top:30px;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 0 40px red;
animation:spin 12s linear infinite;
}

@keyframes spin{
from{transform:rotate(0)}
to{transform:rotate(360deg)}
}

/* floating skulls */

.skull{
position:absolute;
width:70px;
animation:float 12s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-100vh)}
}

/* floating curse text */

.curse{
position:absolute;
color:#ff0000;
font-size:18px;
opacity:0.6;
animation:curseMove 15s linear infinite;
}

@keyframes curseMove{
0%{transform:translateY(100vh)}
100%{transform:translateY(-100vh)}
}

/* watching eyes */

.eye{
position:absolute;
width:90px;
opacity:0.5;
}

/* candles */

.candle{
position:fixed;
bottom:10px;
width:60px;
}

/* lightning */

.flash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
opacity:0;
pointer-events:none;
}

/* timer */

.timer{
font-size:28px;
margin-top:20px;
}

/* button */

button{
background:black;
border:2px solid red;
color:red;
padding:15px 30px;
font-size:18px;
margin-top:20px;
box-shadow:0 0 10px red;
}

</style>
</head>

<body>

<div id="flash" class="flash"></div>

<h1 class="title">THE RITUAL AWAKENS</h1>

<div class="circle">
<h2>REVATHII</h2>
</div>

<div id="timer" class="timer"></div>

<button onclick="start()">START RITUAL</button>

<!-- skulls -->

<img class="skull" style="left:10%" src="https://i.imgur.com/Wv5QK6D.png">
<img class="skull" style="left:40%" src="https://i.imgur.com/Wv5QK6D.png">
<img class="skull" style="left:70%" src="https://i.imgur.com/Wv5QK6D.png">

<!-- eyes -->

<img class="eye" style="top:10%;left:10%" src="https://i.imgur.com/JYUB0m3.png">
<img class="eye" style="top:20%;right:10%" src="https://i.imgur.com/JYUB0m3.png">

<!-- candles -->

<img class="candle" style="left:10px" src="https://i.imgur.com/FY8Vn7N.png">
<img class="candle" style="right:10px" src="https://i.imgur.com/FY8Vn7N.png">

<!-- floating curse text -->

<div class="curse" style="left:15%">Revathii... the circle remembers...</div>
<div class="curse" style="left:50%">Revathii... the shadows whisper...</div>
<div class="curse" style="left:80%">Revathii... the ritual calls...</div>

<audio id="chant" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_0b0b09e74c.mp3">
</audio>

<audio id="whisper">
<source src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_5f48c87a32.mp3">
</audio>

<script>

function start(){

document.getElementById("chant").play();
document.getElementById("whisper").play();

/* lightning */

setInterval(()=>{
let f=document.getElementById("flash");
f.style.opacity="0.8";
setTimeout(()=>{f.style.opacity=0},100);
},4000);

/* countdown */

let time=20;

let timer=setInterval(()=>{

let texts=[
"Shadows gather...",
"The circle grows stronger...",
"The watchers awaken...",
"The ritual spreads..."
];

document.getElementById("timer").innerHTML=
texts[Math.floor(Math.random()*texts.length)]
+"<br><br> Awakening in "+time;

time--;

if(time<0){

clearInterval(timer);

document.body.innerHTML=
"<img src='https://i.imgur.com/Wv5QK6D.png' style='width:300px'>"+
"<h1 style='color:red'>REVATHII — THE RITUAL IS COMPLETE</h1>"+
"<p>The circle has spoken...</p>";

let scream=new Audio("https://cdn.pixabay.com/download/audio/2021/09/01/audio_8b0c33abbe.mp3");
scream.play();

}

},1000);

}

</script>

</body>
</html>
```
